# Deploy: npm run build && npx wrangler deploy
# Secrets (not in git): wrangler secret put STRIPE_SECRET_KEY (and others below)
name = "hestiaverse"
main = "worker/index.ts"
compatibility_date = "2025-09-27"

[assets]
directory = "./dist"
binding = "ASSETS"

# Optional: set here or override in the dashboard / wrangler vars
# Do not set STRIPE_SECRET_KEY here as an empty string; use wrangler secret put only (or dashboard Secrets).
# [vars]
# SITE_URL = "https://hestiaverse.leolaker23.workers.dev"
# STRIPE_PRICE_MONTHLY = "price_xxx"   # also exposed to the browser via GET /api/public-config
# STRIPE_PRICE_YEARLY = "price_yyy"
# SUPABASE_URL = "https://xxx.supabase.co"
# SUPABASE_ANON_KEY = "eyJ..."
