---
layout: base.njk
title: Assessment quiz
permalink: /assessment/quiz/
---

<div id="assessment-quiz" class="max-w-xl mx-auto">
  <div id="quiz-progress" class="mb-6 h-1.5 bg-border rounded-full overflow-hidden" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div id="quiz-progress-bar" class="h-full bg-accent transition-all duration-300" style="width: 0%"></div>
  </div>
  <p id="quiz-step-label" class="text-muted text-sm mb-4 font-mono" aria-live="polite">Question 1 of 20</p>

  <form id="quiz-form" class="space-y-6">
    <div id="quiz-questions-container"></div>
    <div id="quiz-actions" class="flex gap-4 pt-4">
      <button type="button" id="quiz-prev" class="py-2 px-4 rounded-lg border border-border text-muted hover:bg-surface-hover focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-bg" style="display: none;">Back</button>
      <button type="button" id="quiz-next" class="py-2 px-4 rounded-lg bg-accent text-bg font-medium hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-bg">Next</button>
      <button type="submit" id="quiz-submit" class="py-2 px-4 rounded-lg bg-accent text-bg font-medium hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-bg" style="display: none;">See my report</button>
    </div>
  </form>
</div>

<script type="application/json" id="assessment-questions-data">{{ assessmentQuestions | json }}</script>
<script type="module" src="/js/assessment-funnel.js"></script>
