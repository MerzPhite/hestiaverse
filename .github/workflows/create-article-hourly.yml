name: Create article hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/create-article.js --publish

      - name: Build site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/articles.js src/RESEARCH-OUTPUTS.md src/APPS-REFERENCED.md
          git diff --staged --quiet || (git commit -m "chore: add automated article" && git push)
